<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>登录跳转中...</title>
    <script>
        (function() {
            var urlParams = new URLSearchParams(window.location.search);
            var code = urlParams.get('code');
            var state = urlParams.get('state');
            if (code) {
                // 重定向到带 hash 的路由
                window.location.href = '/#/teacher/wx-callback?code=' + encodeURIComponent(code) + '&state=' + (state || '');
            } else {
                // 如果没有 code，跳转到登录页
                window.location.href = '/#/teacher/login';
            }
        })();
    </script>
</head>
<body>
    <p>正在处理登录，请稍候...</p>
</body>
</html>
